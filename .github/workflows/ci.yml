name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    name: "Package Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities
        run: bundle exec brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  test-ruby:
    name: Ruby Backend Ingestion Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/anomaly_test
      REDIS_URL: redis://localhost:6379/0
      ANOMALY_WORKER_TOKEN: test-worker-token
      INGESTION_TOKEN: test-ingest-token
      CABLE_TOKEN: test-cable-token

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle exec rails db:test:prepare
      - run: bundle exec rails test

  test-cpp-worker:
    name: C++ Worker Parsing Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libhiredis-dev libcurl4-openssl-dev nlohmann-json3-dev libgtest-dev

      - name: Configure CMake
        working-directory: ./external_workers/analyzer
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build C++ Worker and Tests
        working-directory: ./external_workers/analyzer
        run: cmake --build build --parallel

      - name: Run Google Tests
        working-directory: ./external_workers/analyzer/build
        run: ctest --output-on-failure
      